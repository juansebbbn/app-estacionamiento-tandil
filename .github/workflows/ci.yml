name: CI Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  backend-test-and-build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: maven
        
    - name: Make mvnw executable
      run: chmod +x ./mvnw
      working-directory: back_app_estacionamiento_tandil
        
    - name: Run backend tests
      run: ./mvnw test
      working-directory: back_app_estacionamiento_tandil
      
    - name: Build application
      run: ./mvnw clean package -DskipTests=false
      working-directory: back_app_estacionamiento_tandil
      
    - name: Generate test report
      uses: dorny/test-reporter@v1
      if: success() || failure()
      with:
        name: Maven Tests
        path: back_app_estacionamiento_tandil/target/surefire-reports/*.xml
        reporter: java-junit
        
    - name: Upload build artifacts
      uses: actions/upload-artifact@v4
      if: success()
      with:
        name: app-artifact
        path: back_app_estacionamiento_tandil/target/*.jar
        retention-days: 30
