name: CI Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  backend-test-and-build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        
    - name: Cache Maven dependencies
      uses: actions/cache@v4
      with:
        path: ~/.m2
        key: ${{ runner.os }}-m2-${{ hashFiles('back_app_estacionamiento_tandil/pom.xml') }}
        restore-keys: ${{ runner.os }}-m2
        
    - name: Run backend tests
      working-directory: ./back_app_estacionamiento_tandil
      run: ./mvnw test
      
    - name: Build backend application
      working-directory: ./back_app_estacionamiento_tandil
      run: ./mvnw clean package -DskipTests=false
        
    - name: Upload backend build artifacts
      uses: actions/upload-artifact@v4
      if: success()
      with:
        name: backend-artifact
        path: back_app_estacionamiento_tandil/target/*.jar
        retention-days: 30
        
    - name: Build Docker image
      if: github.ref == 'refs/heads/main'
      working-directory: ./back_app_estacionamiento_tandil
      run: |
        docker build -t app-estacionamiento-backend:${{ github.sha }} .
        docker tag app-estacionamiento-backend:${{ github.sha }} app-estacionamiento-backend:latest
