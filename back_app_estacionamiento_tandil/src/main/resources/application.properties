spring.application.name=app_estacionamiento_tandil

# ===============================
# DATASOURCE (MySQL Docker)
# ===============================
spring.datasource.url=jdbc:mysql://localhost:3306/app_estacionamiento?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=123
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ===============================
# JPA / HIBERNATE
# ===============================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

# ===============================
# LOGS
# ===============================
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE
logging.level.org.springframework.web=DEBUG

# Solo muestra logs tuyos y errores graves del sistema
logging.level.root=WARN

# Permitir que tus clases SÍ muestren INFO (cambiá 'com.tuapp' por tu paquete real)
logging.level.com.tuapp=INFO

# Opcional: Apagar el dibujo del logo de Spring al arrancar
spring.main.banner-mode=off



